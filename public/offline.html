<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FDC - Offline</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #f8fafc;
      color: #333;
    }
    .container {
      text-align: center;
      padding: 40px;
    }
    h1 { color: #667eea; font-size: 24px; margin-bottom: 16px; }
    p { color: #666; font-size: 16px; line-height: 1.6; }
    .retry-btn {
      display: inline-block;
      margin-top: 24px;
      padding: 12px 24px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>FDC Modular</h1>
    <p>Internet connection is not available.</p>
    <p>Please check your network and try again.</p>
    <a href="/" class="retry-btn">Retry</a>
  </div>
</body>
</html>
